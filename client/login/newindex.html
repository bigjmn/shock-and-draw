<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shock & Draw</title>
  <style>
    :root {
      --bg-1: #0b0d12;
      --bg-2: #12151d;
      --bg-3: #1a1f2b;
      --gold: #f6c35d;
      --gold-strong: #ffcf66;
      --gold-soft: rgba(246, 195, 93, 0.18);
      --panel: rgba(255, 255, 255, 0.05);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f5efe3;
      --text-muted: rgba(245, 239, 227, 0.72);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 201, 92, 0.12), transparent 24%),
        radial-gradient(circle at 20% 85%, rgba(255, 193, 88, 0.06), transparent 30%),
        linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 42%, var(--bg-1) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .background-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 211, 108, 0.12), transparent 18%),
        radial-gradient(circle at 50% 12%, rgba(255, 180, 0, 0.07), transparent 28%);
      filter: blur(10px);
    }

    .shell {
      width: min(100%, 980px);
      display: grid;
      place-items: center;
    }

    .hero {
      width: min(100%, 560px);
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      backdrop-filter: blur(10px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 40px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 201, 92, 0.08), transparent 28%, transparent 72%, rgba(255,255,255,0.04));
      pointer-events: none;
    }

    .title-card {
      width: min(100%, 360px);
      aspect-ratio: 1;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
      filter: drop-shadow(0 14px 30px rgba(0, 0, 0, 0.45));
      border-radius: 20px;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--text-muted);
      font-size: clamp(0.98rem, 2.3vw, 1.08rem);
      line-height: 1.5;
      letter-spacing: 0.01em;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, border-color 180ms ease;
      min-height: 56px;
    }

    .btn:focus-visible {
      outline: 3px solid rgba(255, 207, 102, 0.45);
      outline-offset: 3px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      color: #1a1408;
      background: linear-gradient(180deg, #ffd773 0%, #f6c35d 100%);
      box-shadow:
        0 10px 26px rgba(246, 195, 93, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .btn-primary:hover {
      box-shadow:
        0 14px 30px rgba(246, 195, 93, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.88rem;
      color: rgba(245, 239, 227, 0.55);
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .hero {
        border-radius: 24px;
        padding: 20px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="background-glow"></div>

  <main class="shell">
    <section class="hero" aria-label="Shock and Draw landing page">
      <img
        class="title-card"
        src="titlecard.png"
        alt="Shock and Draw title card"
      />

      <p class="subtitle">
        A fast, chaotic party drawing game with a little voltage.
      </p>

      <div class="actions">
        <button class="btn btn-primary" type="button">Create</button>
        <button class="btn btn-secondary" type="button">Join</button>
      </div>

      <div class="footer-note">Responsive layout for desktop and mobile.</div>
    </section>
  </main>
</body>
</html>
